<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashier – Smart Cart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <span>💳</span>
    <span class="logo">Smart Cart</span>
    <span class="role-badge">Cashier View</span>
  </nav>

  <div class="container">
    <div id="alert" class="alert hidden"></div>

    <div class="grid-2">
      <!-- Left: RFID Scan + Cart -->
      <div>
        <!-- RFID Input -->
        <div class="card" style="margin-bottom:16px;">
          <div class="card-title">📡 Scan Cart RFID</div>
          <div class="input-group">
            <input id="rfid-input" class="form-control" placeholder="RFID-CART-001" autofocus />
            <button class="btn btn-primary" onclick="loadCartByRFID()">Scan</button>
          </div>
          <p style="font-size:0.8rem; color:var(--muted); margin-top:8px;">
            In production, the RFID reader sends this automatically.
          </p>
        </div>

        <!-- Cart Items -->
        <div class="card">
          <div class="card-title">🧾 Cart Items</div>
          <div id="cart-empty" class="empty-state">
            <div class="empty-icon">📡</div>
            <p>Scan a cart's RFID to load items</p>
          </div>
          <div id="cart-content" class="hidden">
            <div class="table-wrap">
              <table>
                <thead><tr><th>Product</th><th>Unit Price</th><th>Qty</th><th>Subtotal</th></tr></thead>
                <tbody id="items-body"></tbody>
              </table>
            </div>
            <div class="total-bar" style="margin-top:16px;">
              <span class="label">Total</span>
              <span class="amount" id="total-display">$0.00</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Payment -->
      <div>
        <div class="card" id="payment-card">
          <div class="card-title">💰 Payment</div>
          <div id="payment-idle" style="text-align:center; color:var(--muted); padding:30px 0;">
            <div style="font-size:2.5rem; margin-bottom:8px;">💳</div>
            <p>Scan a cart first to enable payment</p>
          </div>

          <div id="payment-form" class="hidden">
            <div class="form-group">
              <label>Cashier ID</label>
              <input id="cashier-id" class="form-control" type="number" placeholder="1" value="1" />
            </div>
            <div class="form-group">
              <label>Payment Method</label>
              <select id="payment-method" class="form-control">
                <option value="cash">💵 Cash</option>
                <option value="card">💳 Card</option>
                <option value="digital">📱 Digital Wallet</option>
              </select>
            </div>

            <div style="background:var(--bg); border-radius:8px; padding:16px; margin-bottom:16px;">
              <div style="display:flex; justify-content:space-between; font-size:1.1rem;">
                <span>Amount Due:</span>
                <strong id="payment-total">$0.00</strong>
              </div>
            </div>

            <button class="btn btn-success btn-block" onclick="processCheckout()" style="font-size:1.1rem; padding:14px;">
              ✅ Confirm & Checkout
            </button>
          </div>
        </div>

        <!-- Bill Receipt -->
        <div id="receipt-card" class="card hidden" style="margin-top:16px;">
          <div class="card-title" style="color:var(--success);">✅ Bill Generated</div>
          <div id="receipt-content"></div>
          <button class="btn btn-outline btn-block" style="margin-top:16px;" onclick="printReceipt()">🖨️ Print Receipt</button>
          <button class="btn btn-primary btn-block" style="margin-top:8px;" onclick="resetCashier()">→ Next Customer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let currentCartId = null;
    let currentTotal = 0;

    async function loadCartByRFID() {
      const rfid = document.getElementById('rfid-input').value.trim();
      if (!rfid) return;

      const res = await api.get(`/cart/rfid/${encodeURIComponent(rfid)}`);
      if (!res.success) return showAlert(document.getElementById('alert'), res.message, 'danger');

      currentCartId = res.data.cart.id;
      currentTotal = res.data.total;

      renderItems(res.data.items);
      document.getElementById('total-display').textContent = formatCurrency(currentTotal);
      document.getElementById('payment-total').textContent = formatCurrency(currentTotal);

      document.getElementById('cart-empty').classList.add('hidden');
      document.getElementById('cart-content').classList.remove('hidden');
      document.getElementById('payment-idle').classList.add('hidden');
      document.getElementById('payment-form').classList.remove('hidden');

      showAlert(document.getElementById('alert'), `Cart #${currentCartId} loaded with ${res.data.items.length} items`, 'success');
    }

    function renderItems(items) {
      document.getElementById('items-body').innerHTML = items.map(item => `
        <tr>
          <td>
            <div style="font-weight:600;">${item.name}</div>
            <div style="font-size:0.78rem;color:var(--muted);">${item.category || ''}</div>
          </td>
          <td>${formatCurrency(item.price)}</td>
          <td><span class="badge badge-info">${item.quantity}</span></td>
          <td style="font-weight:600;">${formatCurrency(item.price * item.quantity)}</td>
        </tr>
      `).join('');
    }

    async function processCheckout() {
      if (!currentCartId) return;
      const cashier_id = document.getElementById('cashier-id').value;
      const payment_method = document.getElementById('payment-method').value;

      const res = await api.post('/checkout', {
        cart_id: currentCartId,
        cashier_id: parseInt(cashier_id),
        payment_method,
      });

      if (!res.success) return showAlert(document.getElementById('alert'), res.message, 'danger');

      const bill = res.data.bill;
      showReceipt(bill);
      showAlert(document.getElementById('alert'), `Payment successful! Bill: ${bill.bill_number}`, 'success');
    }

    function showReceipt(bill) {
      document.getElementById('cart-content').classList.add('hidden');
      document.getElementById('payment-form').classList.add('hidden');
      document.getElementById('receipt-card').classList.remove('hidden');

      document.getElementById('receipt-content').innerHTML = `
        <div style="font-family: monospace; border:1px dashed var(--border); border-radius:8px; padding:16px;">
          <div style="text-align:center; margin-bottom:12px;">
            <div style="font-weight:800; font-size:1.1rem;">SMART CART STORE</div>
            <div style="font-size:0.85rem; color:var(--muted);">${formatDate(bill.created_at)}</div>
            <div style="font-weight:700; margin-top:4px;">${bill.bill_number}</div>
          </div>
          <hr style="border:none; border-top:1px dashed var(--border); margin:10px 0;">
          ${bill.items.map(i => `
            <div style="display:flex; justify-content:space-between; font-size:0.88rem; margin-bottom:4px;">
              <span>${i.product_name} x${i.quantity}</span>
              <span>${formatCurrency(i.subtotal)}</span>
            </div>
          `).join('')}
          <hr style="border:none; border-top:1px dashed var(--border); margin:10px 0;">
          <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1rem;">
            <span>TOTAL</span><span>${formatCurrency(bill.total_amount)}</span>
          </div>
          <div style="text-align:center; margin-top:12px; font-size:0.8rem; color:var(--muted);">
            Payment: ${bill.payment_method.toUpperCase()} | Thank you! 🙏
          </div>
        </div>
      `;
    }

    function printReceipt() { window.print(); }

    function resetCashier() {
      currentCartId = null;
      document.getElementById('rfid-input').value = '';
      document.getElementById('cart-empty').classList.remove('hidden');
      document.getElementById('cart-content').classList.add('hidden');
      document.getElementById('payment-idle').classList.remove('hidden');
      document.getElementById('payment-form').classList.add('hidden');
      document.getElementById('receipt-card').classList.add('hidden');
    }

    // Allow Enter key on RFID input
    document.getElementById('rfid-input').addEventListener('keyup', e => {
      if (e.key === 'Enter') loadCartByRFID();
    });
  </script>
</body>
</html>
